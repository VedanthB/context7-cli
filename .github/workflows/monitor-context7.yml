name: Context7 API Health Check

on:
  schedule:
    # Run daily at 9:00 AM UTC
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering

# Security note: This workflow only uses schedule/workflow_dispatch triggers
# and does not process any untrusted user input in run: commands.

jobs:
  health-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test search endpoint
        id: api-test
        run: |
          echo "Testing Context7 search API..."

          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "https://context7.com/api/v1/search?query=react")

          echo "HTTP status: $HTTP_CODE"
          echo "http_code=$HTTP_CODE" >> "$GITHUB_OUTPUT"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::API returned HTTP $HTTP_CODE (expected 200)"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "error_detail=HTTP status $HTTP_CODE (expected 200)" >> "$GITHUB_OUTPUT"
            exit 0  # Don't fail yet — let the issue-creation step handle it
          fi

          # Validate JSON structure: results array with objects containing id fields
          VALIDATION=$(jq -e '
            .results
            | type == "array"
            and length > 0
            and (.[0] | has("id"))
          ' /tmp/response.json 2>&1)

          if [ "$?" -ne 0 ]; then
            echo "::error::Response JSON structure validation failed"
            echo "status=failed" >> "$GITHUB_OUTPUT"
            echo "error_detail=JSON structure invalid: expected .results[] with .id fields. jq output: $VALIDATION" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULT_COUNT=$(jq '.results | length' /tmp/response.json)
          echo "Validation passed: $RESULT_COUNT results returned, each with 'id' field"
          echo "status=passed" >> "$GITHUB_OUTPUT"

      - name: Create issue on failure
        if: steps.api-test.outputs.status == 'failed'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Context7 API health check failed — ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              '## API Health Check Failure',
              '',
              `**Date:** ${new Date().toISOString()}`,
              `**HTTP Status:** ${process.env.HTTP_CODE}`,
              `**Error:** ${process.env.ERROR_DETAIL}`,
              '',
              '### Details',
              'The daily health check against `GET https://context7.com/api/v1/search?query=react` failed.',
              '',
              'This may indicate:',
              '- The Context7 API is down or experiencing issues',
              '- The API response format has changed',
              '- Rate limiting or authentication changes',
              '',
              '### Action Required',
              'Investigate the API status and update the CLI if the API contract has changed.',
              '',
              `*This issue was created automatically by the [API health check workflow](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}).*`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['api-change', 'automated']
            });
        env:
          HTTP_CODE: ${{ steps.api-test.outputs.http_code }}
          ERROR_DETAIL: ${{ steps.api-test.outputs.error_detail }}
